<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dacia Training V7</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Simulation Atelier Dacia</h1>

<div class="container">

  <!-- CLIENT -->
  <div class="left">
    <h3>Cliente</h3>

    <img id="avatar" src="/images/neutral.jpg">

    <div id="trust-bar">
      <div id="trust"></div>
    </div>

    <p id="trustText">50%</p>
  </div>

  <!-- CHAT -->
  <div class="center">
    <h3>Simulation</h3>

    <div id="chat"></div>

    <input id="input" placeholder="Votre réponse...">
    
    <div class="buttons">
      <button onclick="send()">Envoyer</button>
      <button onclick="finishDemo()">Terminer démo</button>
      <button onclick="resetDemo()">Nouvelle démo</button>
    </div>

    <div id="endMessage" class="hidden">
      <h3>Fin de simulation</h3>
      <button onclick="evaluate()">Voir évaluation</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
