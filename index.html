<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dacia Training V6</title>
<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
.container { display:flex; height:100vh; }

.left { width:25%; padding:20px; background:#1a1a1a; }
.center { width:50%; padding:20px; }
.right { width:25%; padding:20px; background:#1a1a1a; }

#chat { height:60vh; overflow:auto; border:1px solid #555; padding:10px; }

#trust-bar { width:100%; height:10px; background:#333; margin-bottom:10px; }
#trust { height:10px; width:50%; background:lime; }

button { margin-top:10px; padding:10px; cursor:pointer; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<!-- CLIENT -->
<div class="left">
<h3>Cliente</h3>
<div id="avatar">😐</div>
<div id="trust-bar"><div id="trust"></div></div>
</div>

<!-- CHAT -->
<div class="center">
<h3>Simulation</h3>

<select id="mode">
<option value="demo">Mode Démo</option>
<option value="eval">Mode Évaluation</option>
</select>

<select id="profil">
<option>Hésitant</option>
<option>Méfiant</option>
<option>Prix</option>
<option>Sceptique</option>
</select>

<select id="scenario">
<option>Révision</option>
<option>Facture élevée</option>
<option>Fin garantie</option>
<option>Usure</option>
</select>

<div id="chat"></div>

<input id="input" placeholder="Votre réponse..." />
<button onclick="send()">Envoyer</button>
<button id="finishDemo" onclick="finishDemo()">Terminer démo</button>

<div id="endMessage" class="hidden">
<h3>Fin de simulation</h3>
<button onclick="evaluate()">Voir évaluation</button>
</div>

</div>

<!-- AIDE -->
<div class="right">
<h3>Aide vendeur</h3>
<button onclick="toggleHelp()">Afficher aide</button>

<div id="helpBox" class="hidden">
<p>CEP : 39€/mois</p>
<p>CEP+ : 69€/mois</p>
<p>👉 Argument : budget maîtrisé + garantie</p>
</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
